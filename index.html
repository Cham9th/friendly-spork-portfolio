  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

6,1,.3,1), transform .85s cubic-bezier(.16,1,.3,1)';\n      el.style.willChange = 'opacity, transform';\n    });\n    this._io = new IntersectionObserver((entries) => {\n      entries.forEach(e => {\n        if (e.isIntersecting){\n          const d = parseFloat(e.target.getAttribute('data-reveal-delay') || '0');\n          e.target.style.transitionDelay = d + 'ms';\n          e.target.style.opacity = '1';\n          e.target.style.transform = 'none';\n          this._io.unobserve(e.target);\n        }\n      });\n    }, { threshold: 0.12, rootMargin: '0px 0px -7% 0px' });\n    els.forEach(el => this._io.observe(el));\n    // Owner-only edit mode: the ADD PHOTO button is hidden for all visitors and\n    // appears only when the URL ends in #edit (so only you can use it).\n    this._syncOwner = () => this.setState({ owner: /(^|#)edit$/i.test(location.hash) });\n    this._syncOwner();\n    window.addEventListener('hashchange', this._syncOwner);\n    // Load a saved (in-browser) photo if the user added one on this device\n    try {\n      const saved = localStorage.getItem(this.PHOTO_KEY);\n      if (saved) this.setState({ photo: saved });\n    } catch (err) {}\n    this._applyPortrait();\n    this._dismissSplash();\n    document.addEventListener('click', this._onDocClick);\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    this._onScroll();\n  }\n\n  componentDidUpdate(){ this._applyPortrait(); }\n\n  _dismissSplash(){\n    const splash = document.getElementById('splash');\n    if (!splash) return;\n    const hide = () => {\n      splash.style.opacity = '0';\n      setTimeout(() => { if (splash && splash.parentNode) splash.remove(); }, 650);\n    };\n    const MIN = 650; // let the logo animation breathe\n    const start = Date.now();\n    const finish = () => setTimeout(hide, Math.max(0, MIN - (Date.now() - start)));\n    if (document.fonts && document.fonts.ready) {\n      let done = false;\n      document.fonts.ready.then(() => { if (!done){ done = true; finish(); } });\n      setTimeout(() => { if (!done){ done = true; finish(); } }, 2500); // fallback if fonts stall\n    } else {\n      setTimeout(hide, 900);\n    }\n  }\n\n  // Show the photo (saved upload OR a committed portrait.jpg), else fall back to the monogram\n  _applyPortrait(){\n    const img = document.getElementById('portraitImg');\n    if (!img) return;\n    if (this.state.photo){\n      img.style.display = 'block';\n      img.src = this.state.photo;\n      img.style.opacity = '1';\n      return;\n    }\n    // no in-browser upload → try the committed file, hide on error\n    if (!img._wired){\n      img._wired = true;\n      img.addEventListener('load', () => { if (!this.state.photo && img.naturalWidth > 0) img.style.opacity = '1'; });\n      img.addEventListener('error', () => { img.style.display = 'none'; });\n    }\n    if (img.complete && img.naturalWidth > 0) img.style.opacity = '1';\n  }\n\n  _onDocClick(e){\n    if (!this.state.photoMenu) return;\n    const wrap = e.target.closest && e.target.closest('.hero-portrait');\n    if (!wrap) this.setState({ photoMenu: false });\n  }\n\n  _handleFile(e){\n    const file = e.target && e.target.files && e.target.files[0];\n    if (!file) return;\n    const reader = new FileReader();\n    reader.onload = () => {\n      const data = reader.result;\n      try { localStorage.setItem(this.PHOTO_KEY, data); } catch (err) {}\n      this.setState({ photo: data, photoMenu: false });\n    };\n    reader.readAsDataURL(file);\n    e.target.value = '';\n  }\n\n  _removePhoto(){\n    try { localStorage.removeItem(this.PHOTO_KEY); } catch (err) {}\n    const img = document.getElementById('portraitImg');\n    if (img){ img.style.display = 'none'; img.style.opacity = '0'; img.removeAttribute('src'); }\n    this.setState({ photo: null, photoMenu: false });\n  }\n\n  componentWillUnmount(){\n    if (this._io) this._io.disconnect();\n    document.removeEventListener('click', this._onDocClick);\n    window.removeEventListener('hashchange', this._syncOwner);\n    window.removeEventListener('scroll', this._onScroll);\n  }\n\n  _onScroll(){\n    const el = this.progressRef.current;\n    if (!el) return;\n    const h = document.documentElement.scrollHeight - window.innerHeight;\n    el.style.width = (h > 0 ? (window.scrollY / h) * 100 : 0) + '%';\n  }\n\n  renderVals(){\n    const A = '#2742DE';\n    const pad = n => ('0' + n).slice(-2);\n\n    const metrics = [\n      { num: '2+',   label: 'Years translating requirements into delivery' },\n      { num: '4',    label: 'Enterprise systems: SAP, Workday, IFS, PeoplesHR' },\n      { num: '680+', label: 'Concurrent users served on TITANS (MERN · GCP)' },\n      { num: '8.0',  label: 'IELTS Academic band — CEFR C1, Proficient' }\n    ];\n\n    const focus = ['Requirements Elicitation', 'Process Mapping', 'Technical Writing', 'Stakeholder Management', 'System Integration'];\n\n    const skillGroups = [\n      { label: 'Business Analysis',   blurb: 'Turning ambiguity into signed-off scope — the documentation that keeps everyone aligned.', items: ['Requirements Elicitation', 'SRS', 'BCD', 'Change Request Evaluation', 'RFP & Compliance', 'Technical Writing'] },\n      { label: 'Enterprise Systems',  blurb: 'Configuring and connecting the platforms enterprises actually run their people and operations on.', items: ['SAP ERP', 'Workday', 'IFS ERP', 'PeoplesHR (HRIS)'] },\n      { label: 'Cloud & Integration', blurb: 'Moving data securely and reliably between systems, on-premise and in the cloud.', items: ['Microsoft Azure', 'Active Directory', 'REST APIs', 'SFTP', 'Power BI'] },\n      { label: 'Data & Programming',  blurb: 'Querying, shaping, and reasoning about the numbers behind the decisions.', items: ['Microsoft SQL Server', 'Python', 'SQL'] },\n      { label: 'Modelling & Tools',   blurb: 'Making process legible — diagrams and boards that a whole team can read.', items: ['UML', 'BPMN', 'Figma', 'Visio', 'JIRA'] },\n      { label: 'Methodologies',       blurb: 'How the work actually ships: iterative, collaborative, and accountable.', items: ['Agile', 'Scrum', 'Stakeholder Management'] }\n    ];\n\n    const skillTabs = skillGroups.map((g, i) => {\n      const active = i === this.state.skill;\n      return {\n        label: g.label,\n        count: pad(g.items.length),\n        onClick: () => this.setState({ skill: i }),\n        numColor: active ? 'color:rgba(246,244,239,.7)' : 'color:' + A,\n        arrowColor: active ? 'color:#F6F4EF' : 'color:rgba(31,29,25,.3)',\n        style: {\n          display: 'flex', alignItems: 'center', gap: '13px', width: '100%',\n          padding: '17px 20px', borderRadius: '13px', cursor: 'pointer',\n          textAlign: 'left', font: '500 15.5px/1 \"IBM Plex Sans\",sans-serif',\n          letterSpacing: '-.01em',\n          border: '1px solid ' + (active ? A : 'rgba(31,29,25,.13)'),\n          background: active ? A : '#fff',\n          color: active ? '#F6F4EF' : '#1F1D19',\n          transition: 'all .28s cubic-bezier(.16,1,.3,1)',\n          boxShadow: active ? '0 10px 26px rgba(39,66,222,.22)' : 'none'\n        }\n      };\n    });\n    const activeGroup = skillGroups[this.state.skill];\n\n    const experience = [\n      { role: 'ICT Business Analyst', org: 'hSenid Business Solutions PLC', period: 'Aug 2025 – Present', loc: 'Colombo, LK', tag: 'ENTERPRISE HRIS & INTEGRATIONS', bullets: [\n        'Design REST API integrations between the PeoplesHR platform and SAP ERP, working with implementation engineers to validate data flows across on-premise and cloud deployments.',\n        'Produce low- and high-fidelity Figma wireframes for new pages and features, turning client requirements into Change Requests (CRs) scoped with development and QA.',\n        'Run Proof of Concept (PoC) demonstrations, configuring PeoplesHR to client specifications and validating solutions with engineering stakeholders.'\n      ] },\n      { role: 'Associate ICT Business Analyst', org: 'hSenid Business Solutions PLC', period: 'Mar 2024 – Jul 2025', loc: 'Colombo, LK', tag: 'PEOPLESHR PRE-SALES · FUNCTIONAL & TECHNICAL', bullets: [\n        'Authored Business Case Documents (BCDs), Software Requirement Specifications (SRSs), and technical documentation for PeoplesHR, API/SFTP, and Microsoft Azure Entra ID & Active Directory integrations.',\n        'Facilitated Change Control Board (CCB) sessions with Product Development, R&D, Implementation, and Support teams to review CRs, define engineering effort, and prepare cost estimates.',\n        'Supported technical solutions for SAP, Workday, and IFS ERP integrations, managing front- and back-end configurations through Bugzilla, Redmine, and SAP Crystal Reports.',\n        'Contributed to Buyer Compliance software for apparel and footwear clients, including a secondary payroll and overtime database with configurable OT caps and holiday exclusions.'\n      ] },\n      { role: 'ICT Business Analyst Intern', org: 'hSenid Business Solutions PLC', period: 'Mar 2023 – Mar 2024', loc: 'Colombo, LK', tag: 'INTERNSHIP', bullets: [\n        'Translated business needs into technical solutions, documenting project specifications and acceptance criteria alongside stakeholders.',\n        'Ran requirement-gathering sessions with end-users and documented workflows using UML, BPMN, Microsoft Visio, and Draw.io.',\n        \"Designed low- and high-fidelity Figma wireframes for a national broadcaster's WordPress solution (Vue.js front-end, .NET 6 API, MS SQL Server).\",\n        'Prepared RFP responses covering technical, security, and cloud-integration requirements (Active Directory, API, SFTP).'\n      ] },\n      { role: 'Full Stack Web Developer', org: 'CorsDeck · Part-time', period: 'Apr 2023 – Jan 2024', loc: 'Colombo, LK', tag: 'MERN · GOOGLE CLOUD · VERCEL', bullets: [\n        'Built TITANS, a MERN web application for the \"Battle of the Saints\" Big Match, deployed on Google Cloud and Vercel and serving 680+ concurrent users.',\n        'Built an admin panel for 20+ users with automated ticket verification and participant management, meeting project requirements on schedule.',\n        'Worked in a cross-functional team of eight developers, designers, and product stakeholders to deliver on time.'\n      ] }\n    ];\n\n    const exps = experience.map((e, i) => {\n      const active = i === this.state.exp;\n      return Object.assign({}, e, {\n        num: pad(i + 1),\n        onClick: () => this.setState({ exp: active ? -1 : i }),\n        headStyle: {\n          display: 'flex', alignItems: 'flex-start', gap: '20px', width: '100%',\n          padding: '30px 0', background: 'transparent', border: 'none', cursor: 'pointer',\n          fontFamily: '\"IBM Plex Sans\",sans-serif', color: '#1F1D19'\n        },\n        chevStyle: {\n          flex: 'none', display: 'grid', placeItems: 'center', width: '36px', height: '36px',\n          borderRadius: '50%', fontSize: '22px', fontWeight: 300,\n          border: '1px solid ' + (active ? A : 'rgba(31,29,25,.2)'),\n          background: active ? A : 'transparent',\n          color: active ? '#F6F4EF' : '#1F1D19',\n          transform: active ? 'rotate(45deg)' : 'rotate(0deg)',\n          transition: 'all .3s cubic-bezier(.16,1,.3,1)'\n        },\n        bodyStyle: {\n          maxHeight: active ? '1400px' : '0px',\n          opacity: active ? 1 : 0,\n          overflow: 'hidden',\n          transition: 'max-height .55s cubic-bezier(.16,1,.3,1), opacity .45s ease'\n        }\n      });\n    });\n\n    const education = [\n      { period: '2023 — 2025', title: \"Postgraduate Degree (Master's) in Business Analytics\", org: 'University of Colombo School of Computing (UCSC)' },\n      { period: '2020 — 2022', title: 'Bachelor of Computing', org: 'Curtin University, Bentley — delivered via SLIIT, Malabe' },\n      { period: '2005 — 2019', title: 'G.C.E. Ordinary & Advanced Level', org: 'Physical Science Stream · Ananda College, Colombo' }\n    ];\n\n    const ielts = [\n      { k: 'LISTEN', v: '8.5' }, { k: 'READ', v: '8.5' }, { k: 'WRITE', v: '7.0' }, { k: 'SPEAK', v: '7.5' }\n    ];\n\n    const hasPhoto = !!this.state.photo;\n    const menuOpen = this.state.photoMenu;\n\n    return {\n      progressRef: this.progressRef,\n      fileRef: this.fileRef,\n      photoBtnLabel: hasPhoto ? 'EDIT' : 'ADD PHOTO',\n      uploadLabel: hasPhoto ? 'Change photo' : 'Upload photo',\n      onEditClick: (e) => { e.stopPropagation(); this.setState(s => ({ photoMenu: !s.photoMenu })); },\n      onUploadClick: (e) => { e.stopPropagation(); if (this.fileRef.current) this.fileRef.current.click(); },\n      onRemoveClick: (e) => { e.stopPropagation(); this._removePhoto(); },\n      onFileChange: (e) => this._handleFile(e),\n      editBtnStyle: {\n        position: 'absolute', right: '12px', bottom: '12px', zIndex: 3,\n        display: this.state.owner ? 'inline-flex' : 'none',\n        alignItems: 'center', gap: '7px', padding: '9px 13px', borderRadius: '999px',\n        background: 'rgba(25,23,18,.82)', color: '#F6F4EF',\n        border: '1px solid rgba(246,244,239,.2)',\n        backdropFilter: 'blur(6px)', WebkitBackdropFilter: 'blur(6px)', cursor: 'pointer',\n        fontFamily: '\"IBM Plex Mono\",monospace', fontSize: '11px', letterSpacing: '.06em'\n      },\n      photoMenuStyle: {\n        position: 'absolute', right: '12px', bottom: '54px', zIndex: 4,\n        width: '186px', background: '#fff', borderRadius: '12px',\n        border: '1px solid rgba(31,29,25,.14)', boxShadow: '0 16px 40px rgba(31,29,25,.22)',\n        overflow: 'hidden',\n        opacity: menuOpen ? 1 : 0,\n        transform: menuOpen ? 'translateY(0) scale(1)' : 'translateY(8px) scale(.97)',\n        transformOrigin: 'bottom right',\n        pointerEvents: menuOpen ? 'auto' : 'none',\n        transition: 'opacity .2s ease, transform .2s cubic-bezier(.16,1,.3,1)'\n      },\n      removeBtnStyle: {\n        display: hasPhoto ? 'flex' : 'none', alignItems: 'center', gap: '10px', width: '100%',\n        padding: '11px 14px', background: 'transparent', border: 'none', cursor: 'pointer',\n        fontFamily: '\"IBM Plex Sans\",sans-serif', fontSize: '13.5px', fontWeight: 500,\n        color: '#b4302a', textAlign: 'left'\n      },\n      emailHref: 'mailto:pasinduchamath23@gmail.com',\n      linkedinHref: 'https://linkedin.com/in/cham9th',\n      cvHref: (typeof window !== 'undefined' && window.__CV_DATA_URI) ? window.__CV_DATA_URI : 'cv.pdf',\n      onCvClick: (e) => {\n        // Prefer a fresh cv.pdf uploaded next to index.html; fall back to the embedded copy.\n        e.preventDefault();\n        const dl = (href) => {\n          const a = document.createElement('a');\n          a.href = href; a.download = 'Chamath-Ramawickrama-CV.pdf';\n          a.rel = 'noopener'; document.body.appendChild(a); a.click(); a.remove();\n        };\n        const embedded = (typeof window !== 'undefined' && window.__CV_DATA_URI) ? window.__CV_DATA_URI : null;\n        fetch('cv.pdf', { method: 'HEAD', cache: 'no-store' })\n          .then(r => { dl(r.ok ? 'cv.pdf' : (embedded || 'cv.pdf')); })\n          .catch(() => { dl(embedded || 'cv.pdf'); });\n      },\n      metrics, focus, skillTabs, exps, education, ielts,\n      activeLabel: activeGroup.label,\n      activeBlurb: activeGroup.blurb,\n      activeItems: activeGroup.items\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
